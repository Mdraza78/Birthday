<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A Birthday Surprise For You 🎂🐧</title>
<meta name="description" content="A penguin-themed interactive birthday surprise — enter the passcode, make a wish, open gifts and read a heartfelt letter." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- SVG heart clip (used by lock screen photo) -->
  <svg width="0" height="0" aria-hidden="true" style="position:absolute">
    <defs>
      <clipPath id="heartClip" clipPathUnits="objectBoundingBox">
        <path d="M0.5,0.97 C0.18,0.72 0,0.5 0,0.3 C0,0.11 0.14,0 0.29,0 C0.39,0 0.47,0.06 0.5,0.13 C0.53,0.06 0.61,0 0.71,0 C0.86,0 1,0.11 1,0.3 C1,0.5 0.82,0.72 0.5,0.97 Z" />
      </clipPath>
    </defs>
  </svg>
  <main id="app"></main>
  <!-- Templates for each screen -->
  <template id="tpl-lock">
    <section class="screen lock-screen">
      <div class="animate-rise heart-photo-wrap">
        <div class="animate-float heart-photo">
          <div class="heart-border"></div>
          <div class="heart-inner">
            <img data-role="photo" alt="A special memory" />
          </div>
        </div>
        <span class="sparkle sparkle-a">✦</span>
        <span class="sparkle sparkle-b">✦</span>
      </div>
      <div class="animate-rise keypad-wrap" data-role="keypad-wrap" style="animation-delay:.15s">
        <h1 class="font-hand title">Enter a passcode</h1>
        <p class="hint" data-role="hint"></p>
        <div class="dots" data-role="dots"></div>
        <div class="keypad" data-role="keypad"></div>
        <div class="lock-actions">
          <button class="btn btn-dark" data-role="clear">Clear</button>
          <button class="btn btn-accent" data-role="unlock">UNLOCK</button>
        </div>
      </div>
    </section>
  </template>
  <template id="tpl-wrong">
    <section class="screen wrong-screen">
      <h1 class="animate-pop font-hand title-huge">Wrong Passcode</h1>
      <img src="Img/penguin-confused.png" alt="Two confused penguins" class="animate-wiggle wrong-img" />
      <button class="animate-stamp btn-try" data-role="retry" style="animation-delay:.4s">TRY AGAIN</button>
    </section>
  </template>
  <template id="tpl-cake">
    <section class="screen cake-screen">
      <p class="animate-rise font-hand cake-greet" data-role="greet"></p>
      <h1 class="animate-rise font-hand title-huge" style="animation-delay:.15s">Make a Wish</h1>
      <p class="animate-rise hint" data-role="cake-hint" style="animation-delay:.3s">Tap the cake to blow out the candles</p>
      <button class="cake-btn" data-role="cake-btn" aria-label="Blow out the candles">
        <div class="flames" data-role="flames">
          <span class="animate-flame">🔥</span>
          <span class="animate-flame" style="animation-delay:.2s">🔥</span>
          <span class="animate-flame" style="animation-delay:.4s">🔥</span>
        </div>
        <img src="Img/cake.png" alt="Birthday cake with candles" class="cake-img animate-float" data-role="cake-img" />
      </button>
      <div class="animate-pop cake-next" data-role="next-wrap" hidden>
        <img src="Img/penguin-party.png" alt="Celebrating penguin" class="animate-wiggle small-penguin" />
        <button class="btn btn-accent big" data-role="next">Next surprise →</button>
      </div>
    </section>
  </template>
  <template id="tpl-gifts">
    <section class="screen gifts-screen">
      <h1 class="animate-rise font-hand title-huge">Click on gifts to open</h1>
      <div class="gifts" data-role="gifts"></div>
      <button class="animate-pop btn btn-accent big" data-role="next" hidden>One more thing →</button>
    </section>
  </template>
  <template id="tpl-memories">
    <section class="screen memories-screen">
      <h1 class="animate-rise font-hand title-huge">Moments I cherish with you</h1>
      <div class="marquee-wrap">
        <div class="animate-marquee marquee" data-role="strip"></div>
      </div>
      <p class="animate-rise hint" style="animation-delay:.3s">every little moment with you is my favorite one 💗</p>
      <button class="animate-rise btn btn-accent big" data-role="next" style="animation-delay:.45s">Read my letter 💌</button>
    </section>
  </template>
  <template id="tpl-letter">
    <section class="screen letter-screen">
      <div data-role="closed">
        <h1 class="animate-rise font-hand title-huge">To the one I adore</h1>
        <button class="animate-float envelope" data-role="open" aria-label="Open the letter">💌</button>
        <p class="animate-rise hint">tap to open</p>
      </div>
      <div class="animate-pop letter-card" data-role="opened" hidden>
        <img src="Img/penguin-party.png" alt="Party penguin" class="letter-penguin animate-wiggle" />
        <p class="font-hand letter-hi">Dear <span data-role="name"></span>,</p>
        <p class="font-hand letter-body">
          Happy birthday! 🎂 Today is all about you — the laughs, the late-night talks, the way you
          make everything brighter. May this year be full of little wins, warm conversations, and
          moments that remind you just how loved you are.
        </p>
        <p class="font-hand letter-body">Forever yours,</p>
        <p class="font-hand letter-sign">— your penguin 🐧</p>
        <div class="love-wrap">
          <div class="hearts" data-role="hearts"></div>
          <button class="btn btn-primary big" data-role="love">Send love 💗</button>
        </div>
      </div>
    </section>
  </template>
  <script src="script.js"></script>
</body>
</html>
