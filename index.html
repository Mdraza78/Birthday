<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Birthday Surprise For You 🎂🐧</title>
  <meta name="description" content="A penguin-themed interactive birthday surprise — enter the passcode, make a wish, open gifts and read a heartfelt letter." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- SVG heart clip (used by lock screen photo) -->
  <svg width="0" height="0" aria-hidden="true" style="position:absolute">
    <defs>
      <clipPath id="heartClip" clipPathUnits="objectBoundingBox">
        <path d="M0.5,0.97 C0.18,0.72 0,0.5 0,0.3 C0,0.11 0.14,0 0.29,0 C0.39,0 0.47,0.06 0.5,0.13 C0.53,0.06 0.61,0 0.71,0 C0.86,0 1,0.11 1,0.3 C1,0.5 0.82,0.72 0.5,0.97 Z" />
      </clipPath>
    </defs>
  </svg>
  <main id="app"></main>

  <!-- Templates for each screen -->
  <template id="tpl-lock">
    <section class="screen lock-screen">
      <div class="animate-rise heart-photo-wrap">
        <div class="animate-float heart-photo">
          <div class="heart-border"></div>
          <div class="heart-inner">
            <img data-role="photo" alt="A special memory" />
          </div>
        </div>
        <span class="sparkle sparkle-a">✦</span>
        <span class="sparkle sparkle-b">✦</span>
      </div>
      <div class="animate-rise keypad-wrap" data-role="keypad-wrap" style="animation-delay:.15s">
        <h1 class="font-hand title">Enter a passcode</h1>
        <p class="hint" data-role="hint"></p>
        <div class="dots" data-role="dots"></div>
        <div class="keypad" data-role="keypad"></div>
        <div class="lock-actions">
          <button class="btn btn-dark" data-role="clear">Clear</button>
          <button class="btn btn-accent" data-role="unlock">UNLOCK</button>
        </div>
      </div>
    </section>
  </template>

  <template id="tpl-wrong">
    <section class="screen wrong-screen">
      <h1 class="animate-pop font-hand title-huge">Wrong Passcode</h1>
      <img src="Img/penguin-confused.png" alt="Two confused penguins" class="animate-wiggle wrong-img" />
      <button class="animate-stamp btn-try" data-role="retry" style="animation-delay:.4s">TRY AGAIN</button>
    </section>
  </template>

  <template id="tpl-cake">
    <section class="screen cake-screen">
      <p class="animate-rise font-hand cake-greet" data-role="greet"></p>
      <h1 class="animate-rise font-hand title-huge" style="animation-delay:.15s">Make a Wish</h1>
      <p class="animate-rise hint" style="animation-delay:.25s">Tap the flame to blow out the candles 🕯️</p>
      <div class="animate-rise cake-btn" style="animation-delay:.35s">
        <div class="flames" data-role="flames">🔥🔥🔥</div>
        <img src="Img/cake.png" alt="Birthday cake with candles" class="animate-float cake-img" data-role="cake-img" />
      </div>
      <p class="hint cake-hint" data-role="cake-hint"></p>
      <div class="cake-next" data-role="next-wrap" hidden>
        <img src="Img/penguin-party.png" alt="Happy penguin" class="animate-pop small-penguin" />
        <button class="btn btn-accent big" data-role="next">Open gifts 🎁</button>
      </div>
    </section>
  </template>

  <template id="tpl-gifts">
    <section class="screen gifts-screen">
      <h1 class="animate-rise font-hand title-huge">Picked Just For You</h1>
      <p class="animate-rise hint" style="animation-delay:.15s">Tap each penguin to unwrap a little gift ✨</p>
      <div class="animate-rise gifts" data-role="gifts" style="animation-delay:.25s"></div>
      <button class="animate-rise btn btn-accent big" data-role="next" hidden style="animation-delay:.45s">See our memories 📸</button>
    </section>
  </template>

  <template id="tpl-memories">
    <section class="screen memories-screen">
      <div class="memory-board">
        <!-- decorative doodles -->
        <span class="doodle star star-1 animate-twinkle">✦</span>
        <span class="doodle star star-2 animate-twinkle" style="animation-delay:.4s">✧</span>
        <span class="doodle star star-3 animate-twinkle" style="animation-delay:.8s">✦</span>
        <span class="doodle star star-4 animate-twinkle" style="animation-delay:.2s">✧</span>
        <span class="doodle heart heart-1 animate-pulse">♡</span>
        <span class="doodle heart heart-2 animate-pulse" style="animation-delay:.6s">♡</span>
        <span class="doodle heart heart-3 animate-pulse" style="animation-delay:.3s">♡</span>
        <span class="doodle swirl swirl-1 animate-twinkle">✿</span>
        <span class="doodle swirl swirl-2 animate-twinkle" style="animation-delay:.5s">❀</span>
        <span class="doodle forever font-hand animate-float">forever ✨</span>
        <span class="doodle love font-hand animate-float" style="animation-delay:.8s">love ♡</span>

        <!-- string across the top -->
        <div class="string"></div>

        <!-- polaroids clipped to string -->
        <div class="clothesline" data-role="strip"></div>

        <!-- white cloud bottom with title -->
        <div class="cloud animate-rise">
          <span class="cloud-star cloud-star-l animate-twinkle">★</span>
          <span class="cloud-star cloud-star-r animate-twinkle" style="animation-delay:.6s">★</span>
          <h1 class="font-hand cloud-title">Moments I Cherish With You</h1>
        </div>
      </div>

      <p class="animate-rise hint" style="animation-delay:.3s">
        every little moment with you is my favorite one 💗
      </p>
      <br>
      <button class="animate-rise btn btn-accent big" data-role="next" style="animation-delay:.45s">
        Watch a little something 🎬
      </button>
    </section>
  </template>

  <template id="tpl-video">
    <section class="screen video-screen">
      <h1 class="animate-rise font-hand title-huge">A Little Something to Watch</h1>
      <p class="animate-rise hint" style="animation-delay:.15s" data-role="caption"></p>

      <div class="animate-rise video-wrap" style="animation-delay:.25s">
        <div class="love-animation" data-role="animation">
          <span class="love-sparkle love-sparkle-a animate-twinkle">✦</span>
          <span class="love-sparkle love-sparkle-b animate-twinkle" style="animation-delay:.6s">✧</span>
          <span class="love-sparkle love-sparkle-c animate-twinkle" style="animation-delay:.3s">✦</span>
          <div class="love-hearts-rise" data-role="rising-hearts"></div>
          <div class="love-petals" data-role="petals"></div>
          <div class="love-scene">
            <svg class="anime-couple" viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="An original illustrated couple">
              <!-- ground shadows -->
              <ellipse cx="140" cy="246" rx="46" ry="9" fill="rgba(0,0,0,.18)" />
              <ellipse cx="262" cy="246" rx="46" ry="9" fill="rgba(0,0,0,.18)" />

              <!-- girl -->
              <g class="anime-figure anime-figure-a">
                <path d="M96,240 Q95,175 108,158 Q140,138 172,158 Q185,175 184,240 Q140,254 96,240 Z" fill="#f2c94c"/>
                <path d="M96,240 Q95,175 108,158" fill="none"/>
                <ellipse cx="60" cy="150" rx="17" ry="42" transform="rotate(-14 60 150)" fill="#6b2436"/>
                <ellipse cx="220" cy="150" rx="17" ry="42" transform="rotate(14 220 150)" fill="#6b2436"/>
                <circle cx="140" cy="112" r="40" fill="#ffe0c4"/>
                <path d="M100,108 Q104,58 140,62 Q176,58 180,108 Q178,84 140,80 Q102,84 100,108 Z" fill="#6b2436"/>
                <circle cx="126" cy="115" r="4.5" fill="#4a2030"/>
                <circle cx="154" cy="115" r="4.5" fill="#4a2030"/>
                <circle cx="127.5" cy="113.5" r="1.4" fill="#fff"/>
                <circle cx="155.5" cy="113.5" r="1.4" fill="#fff"/>
                <ellipse cx="117" cy="126" rx="7" ry="4.5" fill="#f4a6b8" opacity=".65"/>
                <ellipse cx="163" cy="126" rx="7" ry="4.5" fill="#f4a6b8" opacity=".65"/>
                <path d="M129,132 Q140,138 151,132" stroke="#4a2030" stroke-width="2" fill="none" stroke-linecap="round"/>
                <path d="M172,175 Q192,182 200,190" stroke="#ffe0c4" stroke-width="11" fill="none" stroke-linecap="round"/>
              </g>

              <!-- boy -->
              <g class="anime-figure anime-figure-b">
                <path d="M228,240 Q227,175 240,158 Q272,138 304,158 Q317,175 316,240 Q272,254 228,240 Z" fill="#3f6fa8"/>
                <circle cx="272" cy="112" r="40" fill="#ffdcbd"/>
                <path d="M232,110 Q236,58 272,60 Q308,58 312,110 Q306,74 272,70 Q238,74 232,110 Z" fill="#2c3e66"/>
                <path d="M244,90 L236,74" stroke="#2c3e66" stroke-width="8" stroke-linecap="round"/>
                <path d="M300,90 L308,74" stroke="#2c3e66" stroke-width="8" stroke-linecap="round"/>
                <circle cx="258" cy="118" r="4.5" fill="#2c1810"/>
                <circle cx="286" cy="118" r="4.5" fill="#2c1810"/>
                <circle cx="259.5" cy="116.5" r="1.4" fill="#fff"/>
                <circle cx="287.5" cy="116.5" r="1.4" fill="#fff"/>
                <ellipse cx="249" cy="129" rx="6" ry="4" fill="#f4a6b8" opacity=".55"/>
                <ellipse cx="295" cy="129" rx="6" ry="4" fill="#f4a6b8" opacity=".55"/>
                <path d="M261,135 Q272,140 283,135" stroke="#2c1810" stroke-width="2" fill="none" stroke-linecap="round"/>
                <path d="M240,175 Q220,182 212,190" stroke="#ffdcbd" stroke-width="11" fill="none" stroke-linecap="round"/>
              </g>

              <!-- joined hands -->
              <circle cx="206" cy="192" r="9" fill="#ffe0c4"/>
            </svg>
            <span class="love-big-heart animate-pulse">💕</span>
          </div>
        </div>
        <video data-role="video" controls playsinline poster="Img/flower.jpg" hidden>
          <source data-role="source" src="" type="video/mp4" />
          Your browser doesn't support video playback.
        </video>
      </div>

      <label class="btn btn-dark video-upload-btn">
        Use our own video instead
        <input type="file" accept="video/*" data-role="file-input" hidden />
      </label>

      <button class="animate-rise btn btn-accent big" data-role="next" style="animation-delay:.4s">Read my letter 💌</button>
    </section>
  </template>

  <template id="tpl-letter">
    <section class="screen letter-screen">
      <div class="animate-rise closed" data-role="closed">
        <p class="hint">A letter is waiting for you…</p>
        <div class="envelope" role="button" tabindex="0" data-role="open" aria-label="Open letter">💌</div>
        <p class="hint">Tap the envelope to open it</p>
      </div>
      <div class="animate-rise opened" data-role="opened" hidden>
        <div class="letter-card">
          <img src="Img/penguin-gift.png" alt="Penguin holding a heart" class="letter-penguin" />
          <p class="letter-hi font-hand">Hi <span data-role="name"></span> 👋</p>
          <p class="letter-body font-hand">
            Happy birthday to the person who makes every ordinary day feel like a celebration.
            I’m so lucky to have you, and I can’t wait to make a million more memories together.
            You are my favorite notification, my calmest thought, and my happiest reason.
          </p>
          <p class="letter-sign font-hand">All my love, always ♡</p>
        </div>
        <div class="love-wrap">
          <div class="hearts" data-role="hearts"></div>
          <button class="btn btn-primary big" data-role="love">Send love 💗</button>
        </div>
      </div>
    </section>
  </template>

  <script src="script.js"></script>
</body>
</html>
